[[audits.futures]]
who = "Robert M1 (via Claude review) <openclauderobert@nios.net>"
criteria = "safe-to-deploy"
delta = "0.3.32 -> 0.3.33"
notes = "Reviewed full crate-source diff 0.3.32 -> 0.3.33 across all 9 futures-family crates (crates.io tarballs), matching upstream CHANGELOG. Real fixes reviewed and confirmed sound: (1) io/read_until.rs reorders consume()/*read+= to fix ReadLine exception-safety on panic mid-consume; (2) compat/compat01as03.rs wraps NotifyWaker in UnsafeCell + adds unsafe impl Send/Sync, replacing UB (mut pointer cast from &self) with a legitimate UnsafeCell::get() derivation - same runtime behavior, fixes a real stacked-borrows violation; (3) futures_unordered/iter.rs fixes a genuine memory leak (IntoIter::next never released the Arc-refcounted Task node; now does) and tightens IterPinRef's Send bound from Fut: Send to the correct Fut: Sync (yields shared Pin<&Fut> refs - strictly more conservative, cannot introduce new unsoundness). Remainder of the diff is portable-atomic/portable-atomic-alloc feature-gating plumbing (additive, cfg-gated, dead code in this workspace - confirmed no crate here activates those features), doc-link cleanups, and a redundant cfg_attr->cfg simplification. No unsafe outside the two reviewed fixes above, no new I/O, no build.rs, no new required dependencies, no public-API break."

