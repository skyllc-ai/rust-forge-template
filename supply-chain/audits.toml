[[audits.regex-automata]]
who = "Robert M1 (via Claude review) <openclauderobert@nios.net>"
criteria = "safe-to-deploy"
delta = "0.4.15 -> 0.4.16"
notes = "Reviewed full crate-source diff 0.4.15 -> 0.4.16 (crates.io tarballs). Matches upstream CHANGELOG: fixes unsound reverse-suffix/inner literal-optimization logic that could report incorrect match offsets (not incorrect match/no-match, just where a match is reported - upstream PR #1364). Touches meta/strategy.rs, meta/regex.rs, meta/wrappers.rs, meta/mod.rs, meta/limited.rs, meta/reverse_inner.rs, dfa/search.rs, hybrid/search.rs, util/look.rs, util/prefilter/*.rs, plus a new meta/reverse_suffix.rs (270 lines, extracted/refactored optimization logic) and reverse_suffix.rs (new). Confirmed via full-diff grep: zero new 'unsafe' blocks (the only matches are test names like reverse_suffix_rejects_unsafe_overlap), no new I/O, no build.rs changes, no new dependencies. New regression tests specifically target the fixed bug. Official upstream maintainer (BurntSushi), changelog + linked PR match the diff exactly. Worst-case impact of any residual bug in this refactor is a wrong match-offset report (the class of bug being fixed), not memory unsafety, since the whole diff is safe Rust."

[[audits.tokio]]
who = "Robert M1 (via Claude review) <openclauderobert@nios.net>"
criteria = "safe-to-deploy"
delta = "1.52.3 -> 1.53.0"
notes = "Reviewed crate-source diff 1.52.3 -> 1.53.0 (crates.io tarballs), scoped to what our feature set actually compiles (default-features=false; io-util, macros, rt, rt-multi-thread, signal, sync, time, tracing - no fs/net/process/uring). Excluded from deep review as confirmed dead code for this build: io_uring (fs/net io-uring ops, tests/fs_uring_*, requires unstable uring feature + Linux), runtime/metrics (schedule_latency, opt-in histogram), runtime/time_alt (new alt timer wheel, gated #[cfg(all(tokio_unstable, feature='rt-multi-thread'))]), runtime/task/trace + runtime/dump.rs (taskdump, gated cfg_taskdump! which requires tokio_unstable) - none of these compile without RUSTFLAGS=--cfg tokio_unstable, which this workspace does not set. Of the 74 remaining stable-path src files: zero new 'unsafe' occurrences anywhere in the diff (grep-verified across the full set); manually read full diffs of the highest-risk concurrency files (scheduler/multi_thread/worker.rs, scheduler/multi_thread/queue.rs, task/state.rs, task/raw.rs) and confirmed each change is either (a) wiring for the new opt-in schedule-latency metric (cheap is_some() no-ops when unused) or (b) a cosmetic cfg_taskdump!-macro consolidation / non-behavioral refactor (e.g. queue.rs buffer-init loop -> iter::repeat_with().take().collect(), same elements) - no scheduling/stealing/timer algorithm changes. Cargo.toml: version bump + one new empty feature flag (schedule-latency = [], not activated by us) + new uring-only [[test]] entries; no new runtime dependencies, no build.rs (tokio has none). Changelog cross-checked: every listed Fixed/Changed item traces to either the excluded unstable subsystems or the reviewed cosmetic changes."

