[[audits.portable-atomic]]
who = "Robert Nio <50460704+githubrobbi@users.noreply.github.com>"
criteria = "safe-to-deploy"
delta = "1.13.1 -> 1.14.0"
notes = "Reviewed the diff scoped to our CI matrix's architectures (x86_64, aarch64) plus the cross-platform fallback/lib/utils files; skimmed the remainder (avr/msp430/xtensa/riscv/powerpc64/s390x are not CI targets here). x86_64/aarch64 atomic128 changes are a strict-provenance migration (ptr as usize -> ptr.addr(), no behavior change) plus cfg-attribute de-duplication. detect/x86_64.rs and detect/aarch64_apple.rs: mechanical &mut CpuInfo -> CpuInfo return-value refactor, same detection logic; aarch64_apple.rs also trims FEAT_LSE128/LSFE/RCPC3 from the (unused) production detection path to test-only, and replaces a test-only custom raw-syscall+inline-asm sysctlbyname reimplementation with the documented hw.optional.arm.caps bitmap API - a test-code risk reduction, not shipped. fallback/seq_lock.rs (the software fallback for widths without hardware atomic support - not exercised on x86_64/aarch64) was refactored to extract shared logic into a new seq_lock_common.rs; Acquire load + Acquire fence + Release-store structure is unchanged. No new unsafe outside existing patterns, no new I/O, no new dependencies, no build.rs behavior change beyond the same strict-provenance detection. Author (taiki-e) is a well-established Rust atomics/concurrency specialist; no adversarial indicators anywhere in the diff."

