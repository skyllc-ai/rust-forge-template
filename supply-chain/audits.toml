[[audits.toml_writer]]
who = "Robert M1 (via Claude review) <openclauderobert@nios.net>"
criteria = "safe-to-deploy"
delta = "1.1.1+spec-1.1.0 -> 1.1.2+spec-1.1.0"
notes = "Reviewed full crate-source diff (crates.io tarballs). Matches upstream 'fix(writer): Don't overflow' (#1189): src/string.rs's consecutive-quote-run counters (prev_single_quotes/prev_double_quotes) switch from a plain usize += 1 to core::num::Saturating, preventing overflow on a pathological run of thousands of consecutive quote characters in a single TOML string value. Worst case pre-fix was a wrong escaping-metric count (or a debug-mode overflow panic), not memory unsafety. No unsafe, no new external dependencies (core::num::Saturating is a stdlib type), no public-API change."

[[audits.uuid]]
who = "Robert M1 (via Claude review) <openclauderobert@nios.net>"
criteria = "safe-to-deploy"
delta = "1.23.4 -> 1.23.5"
notes = "Reviewed full crate-source diff 1.23.4 -> 1.23.5 (crates.io tarballs). Material changes are confined to src/fmt.rs and src/parser.rs: hex encode/decode refactored from static lookup tables (UPPER/LOWER, HEX_TABLE/SHL4_TABLE) to branchless const fns (nibble_to_hex, decode_hex32); format_hyphenated now derives from format_simple with the standard 8-4-4-4-12 offsets. Arithmetic verified: nibble+b'0'+0x27/0x07 maps 10..15 to a..f/A..F; decode rejects non-hex via accumulated bad flag. Remainder: rustdoc link fix in src/external/serde_support.rs, version-string bumps, and a dev-only benchmark harness (gungraun =0.19.2, cfg(not(wasm32)) dev-dependency; benches not packaged). No unsafe (0 occurrences in diff), no I/O, no build.rs, no new runtime dependencies, no public-API change."

[[audits.uuid]]
who = "Robert M1 (via Claude review) <openclauderobert@nios.net>"
criteria = "safe-to-deploy"
delta = "1.23.5 -> 1.24.0"
notes = "Reviewed full crate-source diff 1.23.5 -> 1.24.0 (crates.io tarballs). Continues today's 1.23.4->1.23.5 delta audit chain. Adds MaybeUninit-buffer encoding API (encode_lower_uninit/encode_upper_uninit on Hyphenated/Simple/Urn/Braced), matching upstream CHANGELOG. New unsafe code in src/fmt.rs, individually verified sound: slice_as_uninit_mut() widens &mut [u8] to &mut [MaybeUninit<u8>] (always-sound direction, MaybeUninit<u8> is layout-identical to u8); write_bytes() slices dst to src.len() (panics via normal slice-index bounds check if src is longer - debug_assert_eq is a redundant early check, not the safety boundary) then ptr::copy_nonoverlapping's src into dst (both slices non-aliasing in every call site: src is always a stack-local array or &'static byte-string literal, never the caller's buffer); assume_init_ascii_mut() (itself unsafe fn, documented caller-must-init-and-ASCII contract) reinterprets back to &mut str, mirroring the pre-existing str::from_utf8_unchecked_mut pattern used elsewhere in this file. Every encode_*_uninit call site pre-slices its buffer to the exact required LENGTH (panics per documented contract if too small) and immediately calls write_bytes with a same-length source, so lengths match by construction. New tests (encode_lower_uninit/encode_upper_uninit) exercise all four format variants and assert bytes outside the written region are untouched. No new dependencies (Cargo.toml diff is version-string only), no I/O, no build.rs, no public-API removal (only additions)."

