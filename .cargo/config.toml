# =============================================================================
# Cargo configuration - deliberately (almost) empty
# =============================================================================
#
# The template ships STOCK Cargo behavior. Policy lives where it is portable:
#
#   * Optimization / LTO / panic / strip choices  -> [profile.*] in Cargo.toml
#   * Toolchain pin                               -> rust-toolchain.toml
#   * Release-build RUSTFLAGS (CPU baseline etc.) -> .github/workflows/release.yml
#
# Build caching is RESILIENT, not required: the just layer auto-detects a
# functional sccache and uses it for every just-driven build (recipes,
# hooks, go/ship pipeline); without it everything runs stock. A hard
# `rustc-wrapper = "sccache"` here would instead break every machine that
# lacks the binary. Enable for plain `cargo` too via ~/.cargo/config.toml.
#
# Machine-specific tuning (linkers, target-dir redirects, target-cpu=native)
# belongs in YOUR user-level ~/.cargo/config.toml, never in the repo -
# ready-made samples: .cargo/macos.sample.toml + .cargo/windows.sample.toml,
# walkthrough: docs/forge/GETTING-STARTED.md § "Performance tuning (optional)".
# Two hard-won reasons:
#
#   * `target-cpu=native` in repo config bakes the BUILD MACHINE's CPU into
#     everyone's binaries (and breaks cross-compilation outright).
#   * Shared target-dir redirects (e.g. /tmp/rust-target) silently accumulate
#     hundreds of GB across workspaces and take down the machine when the
#     volume fills - keep the default per-repo ./target, which `cargo clean`
#     and repo removal actually clean up.
